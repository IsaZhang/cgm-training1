# Nginx HTTPS 配置 - ai-cgm.phrones.com
# 修复 macOS LibreSSL "Connection reset by peer"：禁用 HTTP/2，使用兼容的 TLS 配置
# 部署: ./deploy-nginx.sh 或手动复制到 /etc/nginx/conf.d/cgm.conf

server {
    listen 80;
    server_name ai-cgm.phrones.com;
    root /var/www/html;
    location /.well-known/acme-challenge/ {
        default_type "text/plain";
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    # 禁用 HTTP/2，解决 macOS LibreSSL 在 TLS 握手时 Connection reset by peer
    # http2 on;
    server_name ai-cgm.phrones.com;

    ssl_certificate /etc/nginx/ssl/ai-cgm.phrones.com.crt;
    ssl_certificate_key /etc/nginx/ssl/ai-cgm.phrones.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
